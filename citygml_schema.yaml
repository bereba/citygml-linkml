  Window:
    name: Window
    description: A Window is a construction for closing an opening in a wall  or roof,
      primarily intended to admit light and/or provide ventilation. [cf. ISO  6707-1]
    is_a: AbstractFillingElement
    abstract: false
    attributes:
      class:
        name: class
