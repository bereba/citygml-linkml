  AbstractReliefComponent:
    name: AbstractReliefComponent
    description: An AbstractReliefComponent represents an element of the terrain surface
      - either a TIN, a raster or grid, mass points or break lines.
    is_a: AbstractSpaceBoundary
    abstract: true
    attributes:
      lod:
        name: lod
        description: Indicates the Level of Detail of the terrain component.
        range: IntegerBetween0and3
        required: true
        multivalued: false
      adeOfAbstractReliefComponent:
        name: adeOfAbstractReliefComponent
        description: Augments AbstractReliefComponent with properties defined in an
          ADE.
        range: ADEOfAbstractReliefComponent
        required: false
        multivalued: true
      extent:
        name: extent
        description: Indicates the geometrical extent of the terrain component. The
          geometrical extent is provided as a 2D Surface geometry.
        range: string
        required: false
        multivalued: false
  BreaklineRelief:
    name: BreaklineRelief
    description: A BreaklineRelief represents a terrain component with 3D lines. These
      lines denote break lines or ridge/valley lines.
    is_a: AbstractReliefComponent
    abstract: false
    attributes:
      adeOfBreaklineRelief:
        name: adeOfBreaklineRelief
        description: Augments the BreaklineRelief with properties defined in an ADE.
        range: ADEOfBreaklineRelief
        required: false
        multivalued: true
      ridgeOrValleyLines:
        name: ridgeOrValleyLines
        description: Relates to the 3D MultiCurve geometry of the MassPointRelief.
          This association role is used to represent ridge or valley lines.
        range: string
        required: false
        multivalued: false
      breaklines:
        name: breaklines
        description: Relates to the 3D MultiCurve geometry of the MassPointRelief.
          This association role is used to represent break lines.
        range: string
        required: false
        multivalued: false
  MassPointRelief:
    name: MassPointRelief
    description: A MassPointRelief represents a terrain component as a collection
      of 3D points.
    is_a: AbstractReliefComponent
    abstract: false
    attributes:
      adeOfMassPointRelief:
        name: adeOfMassPointRelief
        description: Augments the MassPointRelief with properties defined in an ADE.
        range: ADEOfMassPointRelief
        required: false
        multivalued: true
      pointCloud:
        name: pointCloud
        description: Relates to the 3D PointCloud of the MassPointRelief.
        range: AbstractPointCloud
        required: false
        multivalued: false
      reliefPoints:
        name: reliefPoints
        description: Relates to the 3D MultiPoint geometry of the MassPointRelief.
        range: string
        required: false
        multivalued: false
  RasterRelief:
    name: RasterRelief
    description: A RasterRelief represents a terrain component as a regular raster
      or grid.
    is_a: AbstractReliefComponent
    abstract: false
    attributes:
      adeOfRasterRelief:
        name: adeOfRasterRelief
        description: Augments the RasterRelief with properties defined in an ADE.
        range: ADEOfRasterRelief
        required: false
        multivalued: true
      grid:
        name: grid
        description: Relates to the DiscreteGridPointCoverage of the RasterRelief.
        range: string
        required: true
        multivalued: false
  ReliefFeature:
    name: ReliefFeature
    description: A ReliefFeature is a collection of terrain components representing
      the Earth's surface, also known as the Digital Terrain Model.
    is_a: AbstractSpaceBoundary
    abstract: false
    attributes:
      lod:
        name: lod
