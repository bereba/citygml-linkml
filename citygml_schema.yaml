name: citygml
description: LinkML schema generated from OGC CityGML 3.0 UML/XMI model (Enterprise
  Architect export)
title: OGC CityGML 3.0
id: https://www.ogc.org/standards/citygml
version: '3.0'
imports:
- linkml:types
prefixes:
  linkml:
    prefix_prefix: linkml
    prefix_reference: https://w3id.org/linkml/
  citygml:
    prefix_prefix: citygml
    prefix_reference: https://www.ogc.org/standards/citygml/
default_prefix: citygml
default_range: string
enums:
  ConditionOfConstructionValue:
    name: ConditionOfConstructionValue
    description: ConditionOfConstructionValue enumerates different conditions of a
      construction. [cf. INSPIRE]
    permissible_values:
      declined:
        text: declined
      demolished:
        text: demolished
      functional:
        text: functional
      projected:
        text: projected
      ruin:
        text: ruin
      underConstruction:
        text: underConstruction
  HeightStatusValue:
    name: HeightStatusValue
    description: HeightStatusValue enumerates the different methods used to capture
      a height. [cf. INSPIRE]
    permissible_values:
      estimated:
        text: estimated
      measured:
        text: measured
  RelationToConstruction:
    name: RelationToConstruction
    description: RelationToConstruction is an enumeration used to describe whether
      an installation is positioned inside and/or outside of a construction.
    permissible_values:
      inside:
        text: inside
      outside:
        text: outside
      bothInsideAndOutside:
        text: bothInsideAndOutside
  TimeseriesTypeValue:
    name: TimeseriesTypeValue
    description: TimeseriesTypeValue enumerates the possible value types for GenericTimeseries
      and TimeValuePair.
    permissible_values:
      int:
        text: int
      double:
        text: double
      string:
        text: string
      geometry:
        text: geometry
      uri:
        text: uri
      bool:
        text: bool
      implicitGeometry:
        text: implicitGeometry
      appearance:
        text: appearance
  TransactionTypeValue:
    name: TransactionTypeValue
    description: 'TransactionTypeValue enumerates the three possible types of transactions:
      insert, delete, or replace.'
    permissible_values:
      insert:
        text: insert
      delete:
        text: delete
      replace:
        text: replace
  TransitionTypeValue:
    name: TransitionTypeValue
    description: TransitionTypeValue enumerates the different kinds of version transitions.
      “planned” and “fork” should be used in cases when from one city model version
      multiple successor versions are being created. “realized” and “merge” should
      be used when different city model versions are converging into a common successor
      version.
    permissible_values:
      planned:
        text: planned
      realized:
        text: realized
      historicalSuccession:
        text: historicalSuccession
      fork:
        text: fork
      merge:
        text: merge
  TextureType:
    name: TextureType
    description: TextureType enumerates the different texture types.
    permissible_values:
      specific:
        text: specific
      typical:
        text: typical
      unknown:
        text: unknown
  WrapMode:
    name: WrapMode
    description: WrapMode enumerates the different fill modes for textures.
    permissible_values:
      none:
        text: none
      wrap:
        text: wrap
      mirror:
        text: mirror
      clamp:
        text: clamp
      border:
        text: border
  RelativeToTerrain:
    name: RelativeToTerrain
    description: RelativeToTerrain enumerates the spatial relations of a city object
      relative to terrain in a qualitative way.
    permissible_values:
      entirelyAboveTerrain:
        text: entirelyAboveTerrain
      substantiallyAboveTerrain:
        text: substantiallyAboveTerrain
      substantiallyAboveAndBelowTerrain:
        text: substantiallyAboveAndBelowTerrain
      substantiallyBelowTerrain:
        text: substantiallyBelowTerrain
      entirelyBelowTerrain:
        text: entirelyBelowTerrain
  RelativeToWater:
    name: RelativeToWater
    description: RelativeToWater enumerates the spatial relations of a city object
      relative to the water surface in a qualitative way.
    permissible_values:
      entirelyAboveWaterSurface:
        text: entirelyAboveWaterSurface
      substantiallyAboveWaterSurface:
        text: substantiallyAboveWaterSurface
      substantiallyAboveAndBelowWaterSurface:
        text: substantiallyAboveAndBelowWaterSurface
      substantiallyBelowWaterSurface:
        text: substantiallyBelowWaterSurface
      entirelyBelowWaterSurface:
        text: entirelyBelowWaterSurface
      temporarilyAboveAndBelowWaterSurface:
        text: temporarilyAboveAndBelowWaterSurface
  SpaceType:
    name: SpaceType
    description: SpaceType is an enumeration that characterises a space according
      to its closure properties.
    permissible_values:
      closed:
        text: closed
      open:
        text: open
      semiOpen:
        text: semiOpen
  GranularityValue:
    name: GranularityValue
    description: GranularityValue enumerates the different levels of granularity in
      which transportation objects are represented.
    permissible_values:
      lane:
        text: lane
      way:
        text: way
  TrafficDirectionValue:
    name: TrafficDirectionValue
    description: TrafficDirectionValue enumerates the allowed directions of travel
      of a mobile object.
    permissible_values:
      forwards:
        text: forwards
      backwards:
        text: backwards
      both:
        text: both
classes:
  ADEOfAbstractConstruction:
    name: ADEOfAbstractConstruction
    description: ADEOfAbstractConstruction acts as a hook to define properties within
      an ADE that are to be added to AbstractConstruction.
    abstract: true
  ADEOfAbstractConstructionSurface:
    name: ADEOfAbstractConstructionSurface
    description: ADEOfAbstractConstructionSurface acts as a hook to define properties
      within an ADE that are to be added to AbstractConstructionSurface.
    abstract: true
  ADEOfAbstractConstructiveElement:
    name: ADEOfAbstractConstructiveElement
    description: ADEOfAbstractConstructiveElement acts as a hook to define properties
      within an ADE that are to be added to AbstractConstructiveElement.
    abstract: true
  ADEOfAbstractFillingElement:
    name: ADEOfAbstractFillingElement
    description: ADEOfAbstractFillingElement acts as a hook to define properties within
      an ADE that are to be added to AbstractFillingElement.
    abstract: true
  ADEOfAbstractFillingSurface:
    name: ADEOfAbstractFillingSurface
    description: ADEOfAbstractFillingSurface acts as a hook to define properties within
      an ADE that are to be added to AbstractFillingSurface.
    abstract: true
  ADEOfAbstractFurniture:
    name: ADEOfAbstractFurniture
    description: ADEOfAbstractFurniture acts as a hook to define properties within
      an ADE that are to be added to AbstractFurniture.
    abstract: true
  ADEOfAbstractInstallation:
    name: ADEOfAbstractInstallation
    description: ADEOfAbstractInstallation acts as a hook to define properties within
      an ADE that are to be added to AbstractInstallation.
    abstract: true
  ADEOfCeilingSurface:
    name: ADEOfCeilingSurface
    description: ADEOfCeilingSurface acts as a hook to define properties within an
      ADE that are to be added to a CeilingSurface.
    abstract: true
  ADEOfDoor:
    name: ADEOfDoor
    description: ADEOfDoor acts as a hook to define properties within an ADE that
      are to be added to a Door.
    abstract: true
  ADEOfDoorSurface:
    name: ADEOfDoorSurface
    description: ADEOfDoorSurface acts as a hook to define properties within an ADE
      that are to be added to a DoorSurface.
    abstract: true
  ADEOfFloorSurface:
    name: ADEOfFloorSurface
    description: ADEOfFloorSurface acts as a hook to define properties within an ADE
      that are to be added to a FloorSurface.
    abstract: true
  ADEOfGroundSurface:
    name: ADEOfGroundSurface
    description: ADEOfGroundSurface acts as a hook to define properties within an
      ADE that are to be added to a GroundSurface.
    abstract: true
  ADEOfInteriorWallSurface:
    name: ADEOfInteriorWallSurface
    description: ADEOfInteriorWallSurface acts as a hook to define properties within
      an ADE that are to be added to an InteriorWallSurface.
    abstract: true
  ADEOfOtherConstruction:
    name: ADEOfOtherConstruction
    description: ADEOfOtherConstruction acts as a hook to define properties within
      an ADE that are to be added to an OtherConstruction.
    abstract: true
  ADEOfOuterCeilingSurface:
    name: ADEOfOuterCeilingSurface
    description: ADEOfOuterCeilingSurface acts as a hook to define properties within
      an ADE that are to be added to an OuterCeilingSurface.
    abstract: true
  ADEOfOuterFloorSurface:
    name: ADEOfOuterFloorSurface
    description: ADEOfOuterFloorSurface acts as a hook to define properties within
      an ADE that are to be added to an OuterFloorSurface.
    abstract: true
  ADEOfRoofSurface:
    name: ADEOfRoofSurface
    description: ADEOfRoofSurface acts as a hook to define properties within an ADE
      that are to be added to a RoofSurface.
    abstract: true
  ADEOfWallSurface:
    name: ADEOfWallSurface
    description: ADEOfWallSurface acts as a hook to define properties within an ADE
      that are to be added to a WallSurface.
    abstract: true
  ADEOfWindow:
    name: ADEOfWindow
    description: ADEOfWindow acts as a hook to define properties within an ADE that
      are to be added to a Window.
    abstract: true
  ADEOfWindowSurface:
    name: ADEOfWindowSurface
    description: ADEOfWindowSurface acts as a hook to define properties within an
      ADE that are to be added to a WindowSurface.
    abstract: true
  ConstructionEvent:
    name: ConstructionEvent
    description: A ConstructionEvent is a data type used to describe a specific event
      that is associated with a construction. Examples are the issuing of a building
      permit or the renovation of a building.
    abstract: false
    attributes:
      event:
        name: event
        description: Indicates the specific event type.
        range: EventValue
        required: true
        multivalued: false
      dateOfEvent:
        name: dateOfEvent
        description: Specifies the date at which the event took or will take place.
        range: date
        required: true
        multivalued: false
      description:
        name: description
        description: Provides additional information on the event.
        range: string
        required: false
        multivalued: false
  Elevation:
    name: Elevation
    description: Elevation is a data type that includes the elevation value itself
      and information on how this elevation was measured. [cf. INSPIRE]
    abstract: false
    attributes:
      elevationReference:
        name: elevationReference
        description: Specifies the level from which the elevation was measured. [cf.
          INSPIRE]
        range: ElevationReferenceValue
        required: true
        multivalued: false
      elevationValue:
        name: elevationValue
        description: Specifies the value of the elevation. [cf. INSPIRE]
        range: string
        required: true
        multivalued: false
  Height:
    name: Height
    description: Height represents a vertical distance (measured or estimated) between
      a low reference and a high reference. [cf. INSPIRE]
    abstract: false
    attributes:
      highReference:
        name: highReference
        description: Indicates the high point used to calculate the value of the height.
          [cf. INSPIRE]
        range: ElevationReferenceValue
        required: true
        multivalued: false
      lowReference:
        name: lowReference
        description: Indicates the low point used to calculate the value of the height.
          [cf. INSPIRE]
        range: ElevationReferenceValue
        required: true
        multivalued: false
      status:
        name: status
        description: Indicates the way the height has been captured. [cf. INSPIRE]
        range: HeightStatusValue
        required: true
        multivalued: false
      value:
        name: value
        description: Specifies the value of the height above or below ground. [cf.
          INSPIRE]
        range: float
        required: true
        multivalued: false
  ADEOfAbstractAtomicTimeseries:
    name: ADEOfAbstractAtomicTimeseries
    description: ADEOfAbstractAtomicTimeseries acts as a hook to define properties
      within an ADE that are to be added to AbstractAtomicTimeseries.
    abstract: true
  ADEOfAbstractTimeseries:
    name: ADEOfAbstractTimeseries
    description: ADEOfAbstractTimeseries acts as a hook to define properties within
      an ADE that are to be added to AbstractTimeseries.
    abstract: true
  ADEOfCompositeTimeseries:
    name: ADEOfCompositeTimeseries
    description: ADEOfCompositeTimeseries acts as a hook to define properties within
      an ADE that are to be added to a CompositeTimeseries.
    abstract: true
  ADEOfDynamizer:
    name: ADEOfDynamizer
    description: ADEOfDynamizer acts as a hook to define properties within an ADE
      that are to be added to a Dynamizer.
    abstract: true
  ADEOfGenericTimeseries:
    name: ADEOfGenericTimeseries
    description: ADEOfGenericTimeseries acts as a hook to define properties within
      an ADE that are to be added to a GenericTimeseries.
    abstract: true
  ADEOfStandardFileTimeseries:
    name: ADEOfStandardFileTimeseries
    description: ADEOfStandardFileTimeseries acts as a hook to define properties within
      an ADE that are to be added to a StandardFileTimeseries.
    abstract: true
  ADEOfTabulatedFileTimeseries:
    name: ADEOfTabulatedFileTimeseries
    description: ADEOfTabulatedFileTimeseries acts as a hook to define properties
      within an ADE that are to be added to a TabulatedFileTimeseries.
    abstract: true
  SensorConnection:
    name: SensorConnection
    description: A SensorConnection provides all details that are required to retrieve
      a specific datastream from an external sensor web service. This data type comprises
      the service type (e.g., OGC SensorThings API, OGC Sensor Observation Services,
      MQTT, proprietary platforms), the URL of the sensor service, the identifier
      for the sensor or thing, and its observed property as well as information about
      the required authentication method.
    abstract: false
    attributes:
      connectionType:
        name: connectionType
        description: Indicates the type of Sensor API to which the SensorConnection
          refers.
        range: SensorConnectionTypeValue
        required: true
        multivalued: false
      observationProperty:
        name: observationProperty
        description: Specifies the phenomenon for which the SensorConnection provides
          observations.
        range: string
        required: true
        multivalued: false
      uom:
        name: uom
        description: Specifies the unit of measurement of the observations.
        range: string
        required: false
        multivalued: false
      sensorID:
        name: sensorID
        description: Specifies the unique identifier of the sensor from which the
          SensorConnection retrieves observations.
        range: string
        required: false
        multivalued: false
      sensorName:
        name: sensorName
        description: Specifies the name of the sensor from which the SensorConnection
          retrieves observations.
        range: string
        required: false
        multivalued: false
      observationID:
        name: observationID
        description: Specifies the unique identifier of the observation that is retrieved
          by the SensorConnection.
        range: string
        required: false
        multivalued: false
      datastreamID:
        name: datastreamID
        description: Specifies the datastream that is retrieved by the SensorConnection.
        range: string
        required: false
        multivalued: false
      baseURL:
        name: baseURL
        description: Specifies the base URL of the Sensor API request.
        range: uri
        required: false
        multivalued: false
      authType:
        name: authType
        description: Specifies the type of authentication required to be able to access
          the Sensor API.
        range: AuthenticationTypeValue
        required: false
        multivalued: false
      mqttServer:
        name: mqttServer
        description: Specifies the name of the MQTT Server. This attribute is relevant
          when the MQTT Protocol is used to connect to a Sensor API.
        range: string
        required: false
        multivalued: false
      mqttTopic:
        name: mqttTopic
        description: Names the specific datastream that is retrieved by the SensorConnection.
          This attribute is relevant when the MQTT Protocol is used to connect to
          a Sensor API.
        range: string
        required: false
        multivalued: false
      linkToObservation:
        name: linkToObservation
        description: Specifies the complete URL to the observation request.
        range: string
        required: false
        multivalued: false
      linkToSensorDescription:
        name: linkToSensorDescription
        description: Specifies the complete URL to the sensor description request.
        range: string
        required: false
        multivalued: false
      sensorLocation:
        name: sensorLocation
        description: Relates the sensor to the city object where it is located.
        range: AbstractCityObject
        required: false
        multivalued: false
  TimeseriesComponent:
    name: TimeseriesComponent
    description: TimeseriesComponent represents an element of a CompositeTimeseries.
    abstract: false
    attributes:
      repetitions:
        name: repetitions
        description: Specifies how often the timeseries that is referenced by the
          TimeseriesComponent should be iterated.
        range: integer
        required: true
        multivalued: false
      additionalGap:
        name: additionalGap
        description: Specifies how much extra time is added after all repetitions
          as an additional gap.
        range: string
        required: false
        multivalued: false
      timeseries:
        name: timeseries
        description: Relates a timeseries to the TimeseriesComponent.
        range: AbstractTimeseries
        required: true
        multivalued: false
  TimeValuePair:
    name: TimeValuePair
    description: A TimeValuePair represents a value that is valid for a given timepoint.
      For each TimeValuePair, only one of the value properties can be used mutually
      exclusive. Which value property has to be provided depends on the selected value
      type in the GenericTimeSeries feature, in which the TimeValuePair is included.
    abstract: false
    attributes:
      timestamp:
        name: timestamp
        description: Specifies the timepoint at which the value of the TimeValuePair
          is valid.
        range: string
        required: true
        multivalued: false
      intValue:
        name: intValue
        description: Specifies the "Integer" value of the TimeValuePair.
        range: integer
        required: false
        multivalued: false
      doubleValue:
        name: doubleValue
        description: Specifies the "Double" value of the TimeValuePair.
        range: float
        required: false
        multivalued: false
      stringValue:
        name: stringValue
        description: Specifies the "String" value of the TimeValuePair.
        range: string
        required: false
        multivalued: false
      geometryValue:
        name: geometryValue
        description: Specifies the geometry value of the TimeValuePair.
        range: string
        required: false
        multivalued: false
      uriValue:
        name: uriValue
        description: Specifies the "URI" value of the TimeValuePair.
        range: uri
        required: false
        multivalued: false
      boolValue:
        name: boolValue
        description: Specifies the "Boolean" value of the TimeValuePair.
        range: boolean
        required: false
        multivalued: false
      implicitGeometryValue:
        name: implicitGeometryValue
        description: Specifies the "ImplicitGeometry" value of the TimeValuePair.
        range: ImplicitGeometry
        required: false
        multivalued: false
      appearanceValue:
        name: appearanceValue
        description: Specifies the "Appearance" value of the TimeValuePair.
        range: AbstractAppearance
        required: false
        multivalued: false
  ADEOfPointCloud:
    name: ADEOfPointCloud
    description: ADEOfPointCloud acts as a hook to define properties within an ADE
      that are to be added to a PointCloud.
    abstract: true
  ADEOfVersion:
    name: ADEOfVersion
    description: ADEOfVersion acts as a hook to define properties within an ADE that
      are to be added to a Version.
    abstract: true
  ADEOfVersionTransition:
    name: ADEOfVersionTransition
    description: ADEOfVersionTransition acts as a hook to define properties within
      an ADE that are to be added to a VersionTransition.
    abstract: true
  Transaction:
    name: Transaction
    description: Transaction represents a modification of the city model by the creation,
      termination, or replacement of a specific city object. While the creation of
      a city object also marks its first object version, the termination marks the
      end of existence of a real world object and, hence, also terminates the final
      version of a city object. The replacement of a city object means that a specific
      version of it is replaced by a new version.
    abstract: false
    attributes:
      type:
        name: type
        description: Indicates the specific type of the Transaction.
        range: TransactionTypeValue
        required: true
        multivalued: false
      newFeature:
        name: newFeature
        description: Relates to the version of the city object subsequent to the Transaction.
        range: AbstractFeatureWithLifespan
        required: false
        multivalued: false
      oldFeature:
        name: oldFeature
        description: Relates to the version of the city object prior to the Transaction.
        range: AbstractFeatureWithLifespan
        required: false
        multivalued: false
  AbstractTextureParameterization:
    name: AbstractTextureParameterization
    description: AbstractTextureParameterization is the abstract superclass for different
      kinds of texture parameterizations.
    abstract: true
  ADEOfAbstractSurfaceData:
    name: ADEOfAbstractSurfaceData
    description: ADEOfAbstractSurfaceData acts as a hook to define properties within
      an ADE that are to be added to AbstractSurfaceData.
    abstract: true
  ADEOfAbstractTexture:
    name: ADEOfAbstractTexture
    description: ADEOfAbstractTexture acts as a hook to define properties within an
      ADE that are to be added to AbstractTexture.
    abstract: true
  ADEOfAppearance:
    name: ADEOfAppearance
    description: ADEOfAppearance acts as a hook to define properties within an ADE
      that are to be added to an Appearance.
    abstract: true
  ADEOfGeoreferencedTexture:
    name: ADEOfGeoreferencedTexture
    description: ADEOfGeoreferencedTexture acts as a hook to define properties within
      an ADE that are to be added to a GeoreferencedTexture.
    abstract: true
  ADEOfParameterizedTexture:
    name: ADEOfParameterizedTexture
    description: ADEOfParameterizedTexture acts as a hook to define properties within
      an ADE that are to be added to a ParameterizedTexture.
    abstract: true
  ADEOfX3DMaterial:
    name: ADEOfX3DMaterial
    description: ADEOfX3DMaterial acts as a hook to define properties within an ADE
      that are to be added to an X3DMaterial.
    abstract: true
  TexCoordGen:
    name: TexCoordGen
    description: TexCoordGen defines texture parameterization using a transformation
      matrix.
    is_a: AbstractTextureParameterization
    abstract: false
    attributes:
      worldToTexture:
        name: worldToTexture
        description: Specifies the 3x4 transformation matrix that defines the transformation
          between world coordinates and texture coordinates.
        range: TransformationMatrix3x4
        required: true
        multivalued: false
      crs:
        name: crs
        range: string
        required: false
        multivalued: false
  TexCoordList:
    name: TexCoordList
    description: TexCoordList defines texture parameterization using texture coordinates.
    is_a: AbstractTextureParameterization
    abstract: false
    attributes:
      textureCoordinates:
        name: textureCoordinates
        description: Specifies the coordinates of texture used for parameterization.
          The texture coordinates are provided separately for each LinearRing of the
          surface geometry object.
        range: DoubleList
        required: true
        multivalued: true
      ring:
        name: ring
        description: Specifies the URIs that point to the LinearRings that are parameterized
          using the given texture coordinates.
        range: uri
        required: true
        multivalued: true
  ADEOfAbstractBridge:
    name: ADEOfAbstractBridge
    description: ADEOfAbstractBridge acts as a hook to define properties within an
      ADE that are to be added to AbstractBridge.
    abstract: true
  ADEOfBridge:
    name: ADEOfBridge
    description: ADEOfBridge acts as a hook to define properties within an ADE that
      are to be added to a Bridge.
    abstract: true
  ADEOfBridgeConstructiveElement:
    name: ADEOfBridgeConstructiveElement
    description: ADEOfBridgeConstructiveElement acts as a hook to define properties
      within an ADE that are to be added to a BridgeConstructiveElement.
    abstract: true
  ADEOfBridgeFurniture:
    name: ADEOfBridgeFurniture
    description: ADEOfBridgeFurniture acts as a hook to define properties within an
      ADE that are to be added to a BridgeFurniture.
    abstract: true
  ADEOfBridgeInstallation:
    name: ADEOfBridgeInstallation
    description: ADEOfBridgeInstallation acts as a hook to define properties within
      an ADE that are to be added to a BridgeInstallation.
    abstract: true
  ADEOfBridgePart:
    name: ADEOfBridgePart
    description: ADEOfBridgePart acts as a hook to define properties within an ADE
      that are to be added to a BridgePart.
    abstract: true
  ADEOfBridgeRoom:
    name: ADEOfBridgeRoom
    description: ADEOfBridgeRoom acts as a hook to define properties within an ADE
      that are to be added to a BridgeRoom.
    abstract: true
  ADEOfAbstractBuilding:
    name: ADEOfAbstractBuilding
    description: ADEOfAbstractBuilding acts as a hook to define properties within
      an ADE that are to be added to AbstractBuilding.
    abstract: true
  ADEOfAbstractBuildingSubdivision:
    name: ADEOfAbstractBuildingSubdivision
    description: ADEOfAbstractBuildingSubdivision acts as a hook to define properties
      within an ADE that are to be added to AbstractBuildingSubdivision.
    abstract: true
  ADEOfBuilding:
    name: ADEOfBuilding
    description: ADEOfBuilding acts as a hook to define properties within an ADE that
      are to be added to a Building.
    abstract: true
  ADEOfBuildingConstructiveElement:
    name: ADEOfBuildingConstructiveElement
    description: ADEOfBuildingConstructiveElement acts as a hook to define properties
      within an ADE that are to be added to a BuildingConstructiveElement.
    abstract: true
  ADEOfBuildingFurniture:
    name: ADEOfBuildingFurniture
    description: ADEOfBuildingFurniture acts as a hook to define properties within
      an ADE that are to be added to a BuildingFurniture.
    abstract: true
  ADEOfBuildingInstallation:
    name: ADEOfBuildingInstallation
    description: ADEOfBuildingInstallation acts as a hook to define properties within
      an ADE that are to be added to a BuildingInstallation.
    abstract: true
  ADEOfBuildingPart:
    name: ADEOfBuildingPart
    description: ADEOfBuildingPart acts as a hook to define properties within an ADE
      that are to be added to a BuildingPart.
    abstract: true
  ADEOfBuildingRoom:
    name: ADEOfBuildingRoom
    description: ADEOfBuildingRoom acts as a hook to define properties within an ADE
      that are to be added to a BuildingRoom.
    abstract: true
  ADEOfBuildingUnit:
    name: ADEOfBuildingUnit
    description: ADEOfBuildingUnit acts as a hook to define properties within an ADE
      that are to be added to a BuildingUnit.
    abstract: true
  ADEOfStorey:
    name: ADEOfStorey
    description: ADEOfStorey acts as a hook to define properties within an ADE that
      are to be added to a Storey.
    abstract: true
  RoomHeight:
    name: RoomHeight
    description: The RoomHeight represents a vertical distance (measured or estimated)
      between a low reference and a high reference. [cf. INSPIRE]
    abstract: false
    attributes:
      highReference:
        name: highReference
        description: Indicates the high point used to calculate the value of the room
          height.
        range: RoomElevationReferenceValue
        required: true
        multivalued: false
      lowReference:
        name: lowReference
        description: Indicates the low point used to calculate the value of the room
          height.
        range: RoomElevationReferenceValue
        required: true
        multivalued: false
      status:
        name: status
        description: Indicates the way the room height has been captured.
