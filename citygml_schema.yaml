  AbstractConstruction:
    name: AbstractConstruction
    description: AbstractConstruction is the abstract superclass for objects that
      are manufactured by humans from construction materials, are connected to earth,
      and are intended to be permanent. A connection with the ground also exists when
      the construction rests by its own weight on the ground or is moveable limited
      on stationary rails or if the construction  is intended to be used mainly stationary.
    is_a: AbstractOccupiedSpace
    abstract: true
    attributes:
      conditionOfConstruction:
        name: conditionOfConstruction
        description: Indicates the life-cycle status of the construction. [cf. INSPIRE]
        range: ConditionOfConstructionValue
        required: false
        multivalued: false
      dateOfConstruction:
        name: dateOfConstruction
        description: Indicates the date at which the construction was completed.
        range: date
        required: false
        multivalued: false
      dateOfDemolition:
        name: dateOfDemolition
        description: Indicates the date at which the construction was demolished.
        range: date
        required: false
        multivalued: false
      constructionEvent:
        name: constructionEvent
        description: Describes specific events in the life-time of the construction.
        range: ConstructionEvent
        required: false
        multivalued: true
      elevation:
        name: elevation
        description: Specifies qualified elevations of the construction in relation
          to a well-defined surface which is commonly taken as origin (e.g., geoid
          or water level). [cf. INSPIRE]
        range: Elevation
        required: false
        multivalued: true
      height:
        name: height
        description: Specifies qualified heights of the construction above ground
          or below ground. [cf. INSPIRE]
        range: Height
        required: false
        multivalued: true
      occupancy:
        name: occupancy
        description: Provides qualified information on the residency of persons, animals,
          or other moveable objects in the construction.
        range: Occupancy
        required: false
        multivalued: true
      adeOfAbstractConstruction:
        name: adeOfAbstractConstruction
        description: Augments AbstractConstruction with properties defined in an ADE.
        range: ADEOfAbstractConstruction
        required: false
        multivalued: true
      boundary:
        name: boundary
        range: AbstractThematicSurface
        required: false
        multivalued: true
  AbstractConstructionSurface:
    name: AbstractConstructionSurface
    description: AbstractConstructionSurface is the abstract superclass for different
      kinds of surfaces that bound a construction.
    is_a: AbstractThematicSurface
    abstract: true
    attributes:
      adeOfAbstractConstructionSurface:
        name: adeOfAbstractConstructionSurface
        description: Augments AbstractConstructionSurface with properties defined
          in an ADE.
        range: ADEOfAbstractConstructionSurface
        required: false
        multivalued: true
      fillingSurface:
        name: fillingSurface
        description: Relates to the surfaces that seal the openings of the construction
          surface.
        range: AbstractFillingSurface
        required: false
        multivalued: true
  AbstractConstructiveElement:
    name: AbstractConstructiveElement
    description: AbstractConstructiveElement is the abstract superclass for the representation
      of volumetric elements of a construction. Examples are walls, beams, slabs.
    is_a: AbstractOccupiedSpace
    abstract: true
    attributes:
      isStructuralElement:
        name: isStructuralElement
        description: Indicates whether the constructive element is essential from
          a structural point of view. A structural element cannot be omitted without
          collapsing of the construction. Examples are pylons and anchorages of bridges.
        range: boolean
        required: false
        multivalued: false
      adeOfAbstractConstructiveElement:
        name: adeOfAbstractConstructiveElement
        description: Augments AbstractConstructiveElement with properties defined
          in an ADE.
        range: ADEOfAbstractConstructiveElement
        required: false
        multivalued: true
      filling:
        name: filling
        description: Relates to the elements that fill the opening of the constructive
          element.
        range: AbstractFillingElement
        required: false
        multivalued: true
      boundary:
        name: boundary
        range: AbstractThematicSurface
        required: false
        multivalued: true
  AbstractFillingElement:
    name: AbstractFillingElement
    description: AbstractFillingElement is the abstract superclass for different kinds
      of elements that fill the openings of a construction.
    is_a: AbstractOccupiedSpace
    abstract: true
    attributes:
      adeOfAbstractFillingElement:
        name: adeOfAbstractFillingElement
        description: Augments AbstractFillingElement with properties defined in an
          ADE.
        range: ADEOfAbstractFillingElement
        required: false
        multivalued: true
  AbstractFillingSurface:
    name: AbstractFillingSurface
    description: AbstractFillingSurface is the abstract superclass for different kinds
      of surfaces that seal openings filled by filling elements.
    is_a: AbstractThematicSurface
    abstract: true
    attributes:
      adeOfAbstractFillingSurface:
        name: adeOfAbstractFillingSurface
        description: Augments AbstractFillingSurface with properties defined in an
          ADE.
        range: ADEOfAbstractFillingSurface
        required: false
        multivalued: true
  AbstractFurniture:
    name: AbstractFurniture
    description: AbstractFurniture is the abstract superclass for the representation
      of furniture objects of a construction.
    is_a: AbstractOccupiedSpace
    abstract: true
    attributes:
      adeOfAbstractFurniture:
        name: adeOfAbstractFurniture
        description: Augments AbstractFurniture with properties defined in an ADE.
        range: ADEOfAbstractFurniture
        required: false
        multivalued: true
  AbstractInstallation:
    name: AbstractInstallation
    description: AbstractInstallation is the abstract superclass for the representation
      of installation objects of a construction.
    is_a: AbstractOccupiedSpace
    abstract: true
    attributes:
      relationToConstruction:
        name: relationToConstruction
        description: Indicates whether the installation is located inside and/or outside
          of the construction.
        range: RelationToConstruction
        required: false
