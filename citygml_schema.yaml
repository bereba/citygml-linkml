  AbstractAtomicTimeseries:
    name: AbstractAtomicTimeseries
    description: AbstractAtomicTimeseries represents the attributes and relationships
      that are common to all kinds of atomic timeseries (GenericTimeseries, TabulatedFileTimeseries,
      StandardFileTimeseries). An atomic timeseries represents time-varying data of
      a specific data type for a single contiguous time interval.
    is_a: AbstractTimeseries
    abstract: true
    attributes:
      observationProperty:
        name: observationProperty
        description: Specifies the phenomenon for which the atomic timeseries provides
          observation values.
        range: string
        required: true
        multivalued: false
      uom:
        name: uom
        description: Specifies the unit of measurement of the observation values.
        range: string
        required: false
        multivalued: false
      adeOfAbstractAtomicTimeseries:
        name: adeOfAbstractAtomicTimeseries
        description: Augments AbstractAtomicTimeseries with properties defined in
          an ADE.
        range: ADEOfAbstractAtomicTimeseries
        required: false
        multivalued: true
  AbstractTimeseries:
    name: AbstractTimeseries
    description: AbstractTimeseries is the abstract superclass representing any type
      of timeseries data.
    is_a: AbstractFeature
    abstract: true
    attributes:
      firstTimestamp:
        name: firstTimestamp
        description: Specifies the beginning of the timeseries.
        range: string
        required: false
        multivalued: false
      lastTimestamp:
        name: lastTimestamp
        description: Specifies the end of the timeseries.
        range: string
        required: false
        multivalued: false
      adeOfAbstractTimeseries:
        name: adeOfAbstractTimeseries
        description: Augments AbstractTimeseries with properties defined in an ADE.
        range: ADEOfAbstractTimeseries
        required: false
        multivalued: true
  AuthenticationTypeValue:
    name: AuthenticationTypeValue
    description: CityGML class from package Dynamizer
    abstract: false
  CompositeTimeseries:
    name: CompositeTimeseries
    description: A CompositeTimeseries is a (possibly recursive) aggregation of atomic
      and composite timeseries. The components of a composite timeseries must have
      non-overlapping time intervals.
    is_a: AbstractTimeseries
    abstract: false
    attributes:
      adeOfCompositeTimeseries:
        name: adeOfCompositeTimeseries
        description: Augments the CompositeTimeseries with properties defined in an
          ADE.
        range: ADEOfCompositeTimeseries
        required: false
        multivalued: true
      component:
        name: component
        description: Relates to the atomic and composite timeseries that are part
          of the CompositeTimeseries. The referenced timeseries are sequentially ordered.
        range: TimeseriesComponent
        required: true
        multivalued: true
  Dynamizer:
    name: Dynamizer
    description: A Dynamizer is an object that injects timeseries data for an individual
      attribute of the city object in which it is included. The timeseries data overrides
      the static value of the referenced city object attribute in order to represent
      dynamic (time-dependent) variations of its value.
    is_a: AbstractDynamizer
    abstract: false
    attributes:
      attributeRef:
        name: attributeRef
        description: Specifies the attribute of a CityGML feature whose value is overridden
          or replaced by the (dynamic) values specified by the Dynamizer.
        range: string
        required: true
        multivalued: false
      startTime:
        name: startTime
        description: Specifies the beginning of the time span for which the Dynamizer
          provides dynamic values.
        range: string
        required: false
        multivalued: false
      endTime:
        name: endTime
        description: Specifies the end of the time span for which the Dynamizer provides
          dynamic values.
        range: string
        required: false
        multivalued: false
      adeOfDynamizer:
        name: adeOfDynamizer
        description: Augments the Dynamizer with properties defined in an ADE.
        range: ADEOfDynamizer
        required: false
        multivalued: true
      dynamicData:
        name: dynamicData
        description: Relates to the timeseries data that is given either inline within
          a CityGML dataset or by a link to an external file containing timeseries
          data.
        range: AbstractTimeseries
        required: false
        multivalued: false
      sensorConnection:
        name: sensorConnection
        description: Relates to the sensor API that delivers timeseries data.
        range: SensorConnection
        required: false
        multivalued: false
  GenericTimeseries:
    name: GenericTimeseries
    description: A GenericTimeseries represents time-varying data in the form of embedded
      time-value-pairs of a specific data type for a single contiguous time interval.
    is_a: AbstractAtomicTimeseries
    abstract: false
    attributes:
      valueType:
        name: valueType
        description: Indicates the specific type of all time-value-pairs that are
          part of the GenericTimeseries.
        range: TimeseriesTypeValue
        required: true
        multivalued: false
      adeOfGenericTimeseries:
        name: adeOfGenericTimeseries
        description: Augments the GenericTimeseries with properties defined in an
          ADE.
        range: ADEOfGenericTimeseries
        required: false
        multivalued: true
      timeValuePair:
        name: timeValuePair
        description: Relates to the time-value-pairs that are part of the GenericTimeseries.
        range: TimeValuePair
        required: true
        multivalued: true
  SensorConnectionTypeValue:
    name: SensorConnectionTypeValue
    description: CityGML class from package Dynamizer
    abstract: false
  StandardFileTimeseries:
    name: StandardFileTimeseries
    description: A StandardFileTimeseries represents time-varying data for a single
      contiguous time interval. The data is provided in an external file referenced
      in the StandardFileTimeseries. The data within the external file is encoded
      according to a dedicated format for the representation of timeseries data such
      as using the OGC TimeseriesML or OGC Observations & Measurements Standard. The
      data type of the data has to be specified within the external file.
    is_a: AbstractAtomicTimeseries
    abstract: false
    attributes:
      fileLocation:
        name: fileLocation
        description: Specifies the URI that points to the external timeseries file.
        range: uri
        required: true
        multivalued: false
      fileType:
        name: fileType
        description: Specifies the format used to represent the timeseries data.
        range: StandardFileTypeValue
        required: true
        multivalued: false
      mimeType:
        name: mimeType
        description: Specifies the MIME type of the external timeseries file.
        range: MimeTypeValue
        required: false
        multivalued: false
      adeOfStandardFileTimeseries:
        name: adeOfStandardFileTimeseries
        description: Augments the StandardFileTimeseries with properties defined in
          an ADE.
        range: ADEOfStandardFileTimeseries
        required: false
        multivalued: true
  StandardFileTypeValue:
    name: StandardFileTypeValue
    description: CityGML class from package Dynamizer
    abstract: false
  TabulatedFileTimeseries:
    name: TabulatedFileTimeseries
    description: A TabulatedFileTimeseries represents time-varying data of a specific
      data type for a single contiguous time interval. The data is provided in an
      external file referenced in the TabulatedFileTimeseries. The file contains table
      structured data using an appropriate file format such as comma-separated values
      (CSV), Microsoft Excel (XLSX) or Google Spreadsheet. The timestamps and the
      values are given in specific columns of the table. Each row represents a single
      time-value-pair. A subset of rows can be selected using the idColumn and idValue
      attributes.
    is_a: AbstractAtomicTimeseries
    abstract: false
    attributes:
      fileLocation:
        name: fileLocation
        description: Specifies the URI that points to the external timeseries file.
        range: uri
        required: true
        multivalued: false
      fileType:
        name: fileType
        description: Specifies the format used to represent the timeseries data.
        range: TabulatedFileTypeValue
        required: true
        multivalued: false
      mimeType:
        name: mimeType
        description: Specifies the MIME type of the external timeseries file.
        range: MimeTypeValue
        required: false
        multivalued: false
      valueType:
        name: valueType
        description: Indicates the specific type of the timeseries data.
        range: TimeseriesTypeValue
        required: true
        multivalued: false
      numberOfHeaderLines:
        name: numberOfHeaderLines
        description: Indicates the number of lines at the beginning of the tabulated
          file that represent headers.
        range: integer
        required: false
        multivalued: false
      fieldSeparator:
        name: fieldSeparator
        description: Indicates which symbol is used to separate the individual values
          in the tabulated file.
        range: string
        required: true
        multivalued: false
      decimalSymbol:
        name: decimalSymbol
        description: Indicates which symbol is used to separate the integer part from
          the fractional part of a decimal number.
        range: string
        required: false
        multivalued: false
      idColumnNo:
        name: idColumnNo
        description: Specifies the number of the column that stores the identifier
          of the time-value-pair.
        range: integer
        required: false
        multivalued: false
      idColumnName:
        name: idColumnName
        description: Specifies the name of the column that stores the identifier of
          the time-value-pair.
        range: string
        required: false
        multivalued: false
      idValue:
        name: idValue
        description: Specifies the value of the identifier for which the time-value-pairs
          are to be selected.
        range: string
        required: false
        multivalued: false
      timeColumnNo:
        name: timeColumnNo
        description: Specifies the number of the column that stores the timestamp
          of the time-value-pair.
        range: integer
        required: false
        multivalued: false
      timeColumnName:
        name: timeColumnName
        description: Specifies the name of the column that stores the timestamp of
          the time-value-pair.
        range: string
        required: false
        multivalued: false
      valueColumnNo:
        name: valueColumnNo
        description: Specifies the number of the column that stores the value of the
          time-value-pair.
        range: integer
        required: false
        multivalued: false
      valueColumnName:
        name: valueColumnName
        description: Specifies the name of the column that stores the value of the
          time-value-pair.
        range: string
        required: false
        multivalued: false
      adeOfTabulatedFileTimeseries:
        name: adeOfTabulatedFileTimeseries
        description: Augments the TabulatedFileTimeseries with properties defined
          in an ADE.
        range: ADEOfTabulatedFileTimeseries
        required: false
        multivalued: true
  TabulatedFileTypeValue:
    name: TabulatedFileTypeValue
    description: CityGML class from package Dynamizer
    abstract: false
  PointCloud:
    name: PointCloud
    description: A PointCloud is an unordered collection of points that is a sampling
      of the geometry of a space or space boundary.
    is_a: AbstractPointCloud
    abstract: false
    attributes:
      mimeType:
        name: mimeType
        description: Specifies the MIME type of the external point cloud file.
        range: MimeTypeValue
        required: false
        multivalued: false
      pointFile:
        name: pointFile
        description: Specifies the URI that points to the external point cloud file.
        range: uri
        required: false
        multivalued: false
      pointFileSrsName:
        name: pointFileSrsName
        description: Indicates the coordinate reference system used by the external
          point cloud file.
        range: string
        required: false
        multivalued: false
      adeOfPointCloud:
        name: adeOfPointCloud
        description: Augments the PointCloud with properties defined in an ADE.
        range: ADEOfPointCloud
        required: false
        multivalued: true
      points:
        name: points
        description: Relates to the 3D MultiPoint geometry of the PointCloud stored
          inline with the city model.
        range: string
        required: false
        multivalued: false
  Version:
    name: Version
    description: Version represents a defined state of a city model consisting of
      the dedicated versions of all city object instances that belong to the respective
      city model version. Versions can have names, a description and can be labeled
      with an arbitrary number of user defined tags.
    is_a: AbstractVersion
    abstract: false
    attributes:
      tag:
        name: tag
        description: Allows for adding keywords to the city model version.
        range: string
        required: false
        multivalued: true
      adeOfVersion:
        name: adeOfVersion
        description: Augments the Version with properties defined in an ADE.
        range: ADEOfVersion
        required: false
        multivalued: true
      versionMember:
        name: versionMember
        description: Relates to all city objects that are part of the city model version.
        range: AbstractFeatureWithLifespan
        required: false
        multivalued: true
  VersionTransition:
    name: VersionTransition
    description: VersionTransition describes the change of the state of a city model
      from one version to another. Version transitions can have names, a description
      and can be further qualified by a type and a reason.
    is_a: AbstractVersionTransition
    abstract: false
    attributes:
      reason:
        name: reason
        description: Specifies why the VersionTransition has been carried out.
        range: string
        required: false
        multivalued: false
      clonePredecessor:
        name: clonePredecessor
        description: Indicates whether the set of city object instances belonging
          to the successor version of the city model is either explicitly enumerated
          within the successor version object (attribute clonePredecessor=false),  or
          has to be derived from the modifications of the city model provided as a
          list of transactions on the city object versions contained in the predecessor
          version (attribute clonePredecessor=true).
        range: boolean
        required: true
        multivalued: false
      type:
        name: type
        description: Indicates the specific type of the VersionTransition.
        range: TransitionTypeValue
        required: false
        multivalued: false
      adeOfVersionTransition:
        name: adeOfVersionTransition
        description: Augments the VersionTransition with properties defined in an
          ADE.
        range: ADEOfVersionTransition
        required: false
        multivalued: true
      from:
        name: from
        description: Relates to the predecessor version of the VersionTransition.
        range: Version
        required: false
        multivalued: false
      to:
        name: to
        description: Relates to the successor version of the VersionTransition.
        range: Version
        required: false
        multivalued: false
      transaction:
        name: transaction
        description: Relates to all transactions that have been applied as part of
          the VersionTransition.
        range: Transaction
        required: false
        multivalued: true
  AbstractSurfaceData:
    name: AbstractSurfaceData
    description: AbstractSurfaceData is the abstract superclass for different kinds
      of textures and material.
    is_a: AbstractFeature
    abstract: true
    attributes:
      isFront:
        name: isFront
        description: Indicates whether the texture or material is assigned to the
          front side or the back side of the surface geometry object.
        range: boolean
        required: false
        multivalued: false
      adeOfAbstractSurfaceData:
        name: adeOfAbstractSurfaceData
        description: Augments AbstractSurfaceData with properties defined in an ADE.
        range: ADEOfAbstractSurfaceData
        required: false
        multivalued: true
  AbstractTexture:
    name: AbstractTexture
    description: AbstractTexture is the abstract superclass to represent the common
      attributes of the classes ParameterizedTexture and GeoreferencedTexture.
    is_a: AbstractSurfaceData
    abstract: true
    attributes:
      imageURI:
        name: imageURI
        description: Specifies the URI that points to the external image data file.
        range: uri
        required: true
        multivalued: false
      mimeType:
        name: mimeType
        description: Specifies the MIME type of the external point cloud file.
        range: MimeTypeValue
        required: false
        multivalued: false
      textureType:
        name: textureType
        description: Indicates the specific type of the texture.
        range: TextureType
        required: false
        multivalued: false
      wrapMode:
        name: wrapMode
        description: Specifies the behaviour of the texture when the texture is smaller
          than the surface to which it is applied.
        range: WrapMode
        required: false
        multivalued: false
      borderColor:
        name: borderColor
        description: Specifies the color of that part of the surface that is not covered
          by the texture.
        range: ColorPlusOpacity
        required: false
        multivalued: false
      adeOfAbstractTexture:
        name: adeOfAbstractTexture
        description: Augments AbstractTexture with properties defined in an ADE.
        range: ADEOfAbstractTexture
        required: false
        multivalued: true
  Appearance:
    name: Appearance
    description: An Appearance is a collection of surface data, i.e., observable properties
      for surface geometry objects in the form of textures and material.
    is_a: AbstractAppearance
    abstract: false
    attributes:
      theme:
        name: theme
        description: Specifies the topic of the Appearance. Each Appearance contains
          surface data for one theme only. Examples of themes are infrared radiation,
          noise pollution, or earthquake-induced structural stress.
        range: string
        required: false
        multivalued: false
      adeOfAppearance:
        name: adeOfAppearance
        description: Augments the Appearance with properties defined in an ADE.
        range: ADEOfAppearance
        required: false
        multivalued: true
      surfaceData:
        name: surfaceData
        description: Relates to the surface data that are part of the Appearance.
        range: AbstractSurfaceData
        required: false
        multivalued: true
  Color:
    name: Color
    description: CityGML class from package Appearance
    is_a: DoubleBetween0and1List
    abstract: false
  ColorPlusOpacity:
    name: ColorPlusOpacity
    description: CityGML class from package Appearance
    is_a: DoubleBetween0and1List
    abstract: false
  GeoreferencedTexture:
    name: GeoreferencedTexture
    description: A GeoreferencedTexture is a texture that uses a planimetric projection.
      It contains an implicit parameterization that is either stored within the image
      file, an accompanying world file or specified using the orientation and referencePoint
      elements.
    is_a: AbstractTexture
    abstract: false
    attributes:
      preferWorldFile:
        name: preferWorldFile
        description: Indicates whether the georeference from the image file or the
          accompanying world file should be preferred.
        range: boolean
        required: false
        multivalued: false
      orientation:
        name: orientation
